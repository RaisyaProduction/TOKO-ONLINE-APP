<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TOKO ONLINE APP - Superadmin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .btn {
            transition: all 0.3s ease;
            border-radius: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.97); }
        .input-field {
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: border-color 0.3s;
            background: white;
        }
        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex;
            align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(4px);
        }
        .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        @media (min-width: 768px) { .sidebar { transform: translateX(0); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div id="app" class="w-full max-w-md"></div>

    <script>
        // ==================== STORAGE ====================
        const STORAGE_KEY = 'toko_online_app';

        function getData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) {
                const initial = {
                    superadmin: {
                        username: 'admin',
                        password: 'admin123',
                        nama: 'apptokoonline',
                        nomorHp: '081220285226',
                        email: 'dedesugiono.ai@gmail.com'
                    },
                    toko: [],  // kosong dulu
                    nextTokoId: 1
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(initial));
                return initial;
            }
            return JSON.parse(raw);
        }

        function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

        // ==================== STATE ====================
        let state = {
            currentUser: null,
            isSuperadmin: false,
            activeMenu: 'manajemen',
            showModal: false,
            modalType: '',
            lupaStep: 1,
            lupaUsername: '',
        };

        // ==================== RENDER UTAMA ====================
        function render() {
            const app = document.getElementById('app');
            if (!state.isSuperadmin) {
                document.body.className = 'flex items-center justify-center p-4';
                app.className = 'w-full max-w-md';
                app.innerHTML = renderLoginPage();
                attachLoginEvents();
            } else {
                document.body.className = '';
                app.className = '';
                app.innerHTML = renderSuperadminDashboard();
                attachSuperadminEvents();
            }
        }

        // ==================== LOGIN ====================
        function renderLoginPage() {
            return `
                <div class="card p-8">
                    <div class="text-center mb-8">
                        <div class="text-5xl mb-4">🛍️</div>
                        <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-600 to-blue-500 bg-clip-text text-transparent">
                            TOKO ONLINE APP
                        </h1>
                        <p class="text-gray-600 mt-2 font-medium">Login Superadmin</p>
                    </div>
                    <form id="loginForm" class="space-y-5">
                        <input type="text" id="username" placeholder="Username" class="input-field" required>
                        <input type="password" id="password" placeholder="Password" class="input-field" required>
                        <button type="submit" class="w-full btn bg-gradient-to-r from-purple-600 to-blue-500 text-white py-3 text-lg">Masuk</button>
                    </form>
                    <div class="text-center mt-4">
                        <a href="#" id="lupaPasswordLink" class="text-sm text-purple-600 hover:underline font-medium">Lupa Password?</a>
                    </div>
                    <p id="loginError" class="text-red-500 text-sm mt-3 text-center font-medium"></p>
                </div>
            `;
        }

        function attachLoginEvents() {
            document.getElementById('loginForm')?.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const data = getData();

                if (username === data.superadmin.username && password === data.superadmin.password) {
                    state.isSuperadmin = true;
                    state.activeMenu = 'manajemen';
                    render();
                } else {
                    document.getElementById('loginError').textContent = 'Username atau password salah.';
                }
            });

            document.getElementById('lupaPasswordLink')?.addEventListener('click', function(e) {
                e.preventDefault();
                state.lupaStep = 1;
                showLupaPasswordModal();
            });
        }

        // ==================== LUPA PASSWORD ====================
        function showLupaPasswordModal() {
            state.showModal = true;
            renderLupaModal();
        }

        function renderLupaModal() {
            const existing = document.getElementById('lupaModal');
            if (existing) existing.remove();
            const modal = document.createElement('div');
            modal.id = 'lupaModal';
            modal.className = 'modal';
            let content = '';

            if (state.lupaStep === 1) {
                content = `
                    <div class="card p-6 w-full max-w-sm mx-4">
                        <h2 class="text-xl font-bold mb-4">Lupa Password</h2>
                        <p class="mb-4">Masukkan username superadmin.</p>
                        <input type="text" id="lupaUsername" class="input-field mb-4" placeholder="Username">
                        <div class="flex gap-3">
                            <button id="cariAkunBtn" class="btn bg-blue-600 text-white px-4 py-2">Cari</button>
                            <button id="batalLupaBtn" class="btn bg-gray-300 px-4 py-2">Batal</button>
                        </div>
                        <p id="lupaError" class="text-red-500 text-sm mt-2"></p>
                    </div>
                `;
            } else if (state.lupaStep === 2) {
                const kontak = getData().superadmin.email + ' / ' + getData().superadmin.nomorHp;
                content = `
                    <div class="card p-6 w-full max-w-sm mx-4">
                        <h2 class="text-xl font-bold mb-4">Verifikasi Kontak</h2>
                        <p class="mb-4">Token reset dikirim ke <b>${kontak}</b> (simulasi: <b>123456</b>).</p>
                        <input type="text" id="tokenLupa" class="input-field mb-4" placeholder="Masukkan token">
                        <div class="flex gap-3">
                            <button id="verifTokenBtn" class="btn bg-blue-600 text-white px-4 py-2">Verifikasi</button>
                            <button id="batalLupa2Btn" class="btn bg-gray-300 px-4 py-2">Batal</button>
                        </div>
                        <p id="tokenError" class="text-red-500 text-sm mt-2"></p>
                    </div>
                `;
            } else if (state.lupaStep === 3) {
                content = `
                    <div class="card p-6 w-full max-w-sm mx-4">
                        <h2 class="text-xl font-bold mb-4">Password Baru</h2>
                        <input type="password" id="passBaru" class="input-field mb-4" placeholder="Password baru">
                        <button id="simpanPassBtn" class="w-full btn bg-green-600 text-white py-2">Simpan</button>
                        <p id="simpanError" class="text-red-500 text-sm mt-2"></p>
                    </div>
                `;
            }

            modal.innerHTML = content;
            document.body.appendChild(modal);
            attachLupaEvents();
        }

        function attachLupaEvents() {
            if (state.lupaStep === 1) {
                document.getElementById('cariAkunBtn')?.addEventListener('click', () => {
                    const username = document.getElementById('lupaUsername').value.trim();
                    const data = getData();
                    if (username === data.superadmin.username) {
                        state.lupaUsername = username;
                        state.lupaStep = 2;
                        document.getElementById('lupaModal').remove();
                        renderLupaModal();
                    } else {
                        document.getElementById('lupaError').textContent = 'Username tidak ditemukan.';
                    }
                });
                document.getElementById('batalLupaBtn')?.addEventListener('click', closeLupaModal);
            } else if (state.lupaStep === 2) {
                document.getElementById('verifTokenBtn')?.addEventListener('click', () => {
                    if (document.getElementById('tokenLupa').value.trim() === '123456') {
                        state.lupaStep = 3;
                        document.getElementById('lupaModal').remove();
                        renderLupaModal();
                    } else {
                        document.getElementById('tokenError').textContent = 'Token salah.';
                    }
                });
                document.getElementById('batalLupa2Btn')?.addEventListener('click', closeLupaModal);
            } else if (state.lupaStep === 3) {
                document.getElementById('simpanPassBtn')?.addEventListener('click', () => {
                    const newPass = document.getElementById('passBaru').value;
                    if (!newPass || newPass.length < 3) {
                        document.getElementById('simpanError').textContent = 'Minimal 3 karakter.';
                        return;
                    }
                    const data = getData();
                    data.superadmin.password = newPass;
                    saveData(data);
                    closeLupaModal();
                    alert('Password superadmin berhasil diubah. Silakan login dengan password baru.');
                });
            }
        }

        function closeLupaModal() {
            document.getElementById('lupaModal')?.remove();
            state.showModal = false;
            state.lupaStep = 1;
            render();
        }

        // ==================== SUPERADMIN DASHBOARD ====================
        function renderSuperadminDashboard() {
            return `
                <div class="flex flex-col min-h-screen">
                    <header class="bg-gradient-to-r from-purple-700 to-purple-900 text-white p-4 shadow-lg flex justify-between items-center">
                        <h1 class="text-xl font-bold">TOKO ONLINE APP - Superadmin</h1>
                        <button id="logoutSuperBtn" class="btn bg-red-500 hover:bg-red-600 text-white px-4 py-2">Logout</button>
                    </header>
                    <div class="flex flex-1">
                        <!-- Sidebar -->
                        <aside class="bg-white w-64 p-4 shadow-lg hidden md:block">
                            <h2 class="text-lg font-bold mb-4">Menu</h2>
                            <nav class="space-y-2">
                                <button class="menu-super-btn w-full text-left px-4 py-2 rounded-lg ${state.activeMenu==='manajemen'?'bg-purple-100 text-purple-700 font-semibold':'hover:bg-gray-100'}" data-menu="manajemen">📋 Manajemen Toko</button>
                                <button class="menu-super-btn w-full text-left px-4 py-2 rounded-lg ${state.activeMenu==='profil'?'bg-purple-100 text-purple-700 font-semibold':'hover:bg-gray-100'}" data-menu="profil">👤 Profil</button>
                                <button class="menu-super-btn w-full text-left px-4 py-2 rounded-lg ${state.activeMenu==='pengaturan'?'bg-purple-100 text-purple-700 font-semibold':'hover:bg-gray-100'}" data-menu="pengaturan">⚙️ Pengaturan</button>
                            </nav>
                        </aside>
                        <!-- Main Content -->
                        <main class="flex-1 p-6 bg-gray-50">
                            ${renderSuperadminContent()}
                        </main>
                    </div>
                </div>
            `;
        }

        function renderSuperadminContent() {
            switch (state.activeMenu) {
                case 'manajemen': return renderManajemenToko();
                case 'profil': return renderProfilSuperadmin();
                case 'pengaturan': return renderPengaturanSuperadmin();
                default: return '';
            }
        }

        function renderManajemenToko() {
            const data = getData();
            if (data.toko.length === 0) {
                return `
                    <div class="card p-6">
                        <h2 class="text-2xl font-bold mb-4">Manajemen Toko</h2>
                        <p class="text-gray-500">Belum ada toko terdaftar. Silakan buat toko baru di menu <b>Pengaturan</b>.</p>
                    </div>
                `;
            }
            // Nanti kalau sudah ada toko, tampilkan daftar
            return `
                <div class="card p-6">
                    <h2 class="text-2xl font-bold mb-4">Manajemen Toko</h2>
                    ${data.toko.map(t => `<p>${t.namaToko}</p>`).join('')}
                </div>
            `;
        }

        function renderProfilSuperadmin() {
            const sa = getData().superadmin;
            return `
                <div class="card p-6 max-w-xl">
                    <h2 class="text-2xl font-bold mb-4">Profil Superadmin</h2>
                    <div class="space-y-3">
                        <p><strong>Nama:</strong> ${sa.nama || '-'}</p>
                        <p><strong>Username:</strong> ${sa.username}</p>
                        <p><strong>Email:</strong> ${sa.email || '-'}</p>
                        <p><strong>No HP:</strong> ${sa.nomorHp || '-'}</p>
                    </div>
                    <div class="flex gap-2 mt-6">
                        <button id="editProfilSuperBtn" class="btn bg-blue-600 text-white px-4 py-2">Edit Profil</button>
                        <button id="gantiPassSuperBtn" class="btn bg-yellow-600 text-white px-4 py-2">Ganti Password</button>
                    </div>
                </div>
            `;
        }

        function renderPengaturanSuperadmin() {
            return `
                <div class="card p-6 max-w-xl">
                    <h2 class="text-2xl font-bold mb-4">Pengaturan</h2>
                    <p class="mb-4">Buat toko baru untuk penyewa.</p>
                    <form id="buatTokoForm" class="space-y-4">
                        <input type="text" id="namaTokoInput" placeholder="Nama Toko" class="input-field" required>
                        <input type="text" id="alamatTokoInput" placeholder="Alamat Toko" class="input-field">
                        <input type="text" id="hpTokoInput" placeholder="Nomor HP Toko" class="input-field">
                        <input type="email" id="emailTokoInput" placeholder="Email Toko" class="input-field">
                        <select id="paketSewa" class="input-field" required>
                            <option value="trial">Trial (30 hari)</option>
                            <option value="1bulan">1 Bulan</option>
                            <option value="6bulan">6 Bulan</option>
                            <option value="1tahun">1 Tahun</option>
                        </select>
                        <hr>
                        <p class="font-medium">Akun Pemilik Toko</p>
                        <input type="text" id="usernamePemilik" placeholder="Username Pemilik" class="input-field" required>
                        <input type="password" id="passwordPemilik" placeholder="Password Pemilik" class="input-field" required>
                        <button type="submit" class="w-full btn bg-purple-600 text-white py-3">Buat Toko</button>
                    </form>
                </div>
            `;
        }

        function attachSuperadminEvents() {
            document.getElementById('logoutSuperBtn')?.addEventListener('click', () => {
                state.isSuperadmin = false;
                render();
            });
            document.querySelectorAll('.menu-super-btn').forEach(btn => btn.addEventListener('click', function() {
                state.activeMenu = this.dataset.menu;
                render();
            }));
            // Edit profil superadmin
            document.getElementById('editProfilSuperBtn')?.addEventListener('click', () => {
                const data = getData();
                const nama = prompt('Nama:', data.superadmin.nama);
                const email = prompt('Email:', data.superadmin.email);
                const hp = prompt('No HP:', data.superadmin.nomorHp);
                if (nama !== null) {
                    data.superadmin.nama = nama;
                    data.superadmin.email = email;
                    data.superadmin.nomorHp = hp;
                    saveData(data);
                    render();
                }
            });
            // Ganti password superadmin
            document.getElementById('gantiPassSuperBtn')?.addEventListener('click', () => {
                const old = prompt('Password lama:');
                const data = getData();
                if (old !== data.superadmin.password) return alert('Password lama salah!');
                const baru = prompt('Password baru:');
                if (baru && baru.length >= 3) {
                    data.superadmin.password = baru;
                    saveData(data);
                    alert('Password berhasil diubah.');
                }
            });
            // Buat toko baru
            document.getElementById('buatTokoForm')?.addEventListener('submit', function(e) {
                e.preventDefault();
                const nama = document.getElementById('namaTokoInput').value.trim();
                const username = document.getElementById('usernamePemilik').value.trim();
                const password = document.getElementById('passwordPemilik').value.trim();
                if (!nama || !username || !password) return alert('Lengkapi data!');
                const paket = document.getElementById('paketSewa').value;
                let tambahanHari = paket === 'trial' ? 30 : paket === '1bulan' ? 30 : paket === '6bulan' ? 180 : 365;
                const masaAktif = new Date();
                masaAktif.setDate(masaAktif.getDate() + tambahanHari);
                const data = getData();
                const newToko = {
                    id: 'toko' + data.nextTokoId++,
                    namaToko: nama,
                    alamatToko: document.getElementById('alamatTokoInput').value.trim(),
                    nomorHp: document.getElementById('hpTokoInput').value.trim(),
                    email: document.getElementById('emailTokoInput').value.trim(),
                    sewa: {
                        paket,
                        masaAktif: masaAktif.toISOString().split('T')[0],
                        status: 'active'
                    },
                    users: [
                        { id: 'owner' + Date.now(), username, password, role: 'OWNER' }
                    ],
                    products: [],
                    stockLogs: [],
                    transaksi: [],
                    permissions: [],
                    nextId: 1,
                    kodeCounter: 1000
                };
                data.toko.push(newToko);
                saveData(data);
                alert('Toko baru berhasil dibuat!');
                state.activeMenu = 'manajemen';
                render();
            });
        }

        // Mulai aplikasi
        render();
    </script>
</body>
</html>
