<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Online App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
    .container { max-width: 500px; margin: 80px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    h1, h2 { color: #1a56db; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
    input:focus, textarea:focus { outline: none; border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.2); }
    button { background: #1a56db; color: white; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
    button:hover { background: #1e40af; }
    .error { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
    .success { color: #059669; background: #d1fae5; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
    .link { color: #1a56db; text-decoration: none; font-size: 14px; cursor: pointer; }
    .link:hover { text-decoration: underline; }
    .hidden { display: none !important; }
    /* Dashboard Layout */
    .dashboard { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: #fff; box-shadow: 2px 0 8px rgba(0,0,0,0.05); padding: 20px; display: flex; flex-direction: column; }
    .sidebar h2 { font-size: 20px; margin-bottom: 30px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; color: #374151; text-decoration: none; font-weight: 500; }
    .sidebar nav a.active, .sidebar nav a:hover { background: #eff6ff; color: #1a56db; }
    .content { flex: 1; padding: 40px; background: #f9fafb; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .btn-sm { padding: 6px 15px; font-size: 14px; width: auto; display: inline-flex; align-items: center; gap: 6px; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: #059669; }
    .btn-success:hover { background: #047857; }
    .profile-info p { margin: 8px 0; font-size: 15px; }
    .profile-info strong { display: inline-block; width: 120px; }
    @media (max-width: 768px) {
      .dashboard { flex-direction: column; }
      .sidebar { width: 100%; box-shadow: none; border-bottom: 1px solid #e5e7eb; }
      .content { padding: 20px; }
    }
  </style>
</head>
<body>
  <!-- Halaman Login -->
  <div id="loginPage" class="container">
    <h1>🔐 Login</h1>
    <div id="loginError" class="error hidden"></div>
    <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <div style="text-align:center; margin-top:10px;">
      <span class="link" onclick="showForgotPassword()">Lupa Password?</span>
    </div>
  </div>

  <!-- Halaman Lupa Password -->
  <div id="forgotPage" class="container hidden">
    <h1>🔑 Lupa Password</h1>
    <p style="margin-bottom:15px;">Masukkan email atau nomor HP yang terdaftar.</p>
    <div id="forgotError" class="error hidden"></div>
    <input type="text" id="forgotInput" placeholder="Email atau Nomor HP">
    <button onclick="verifyIdentity()">Lanjutkan</button>
    <div style="text-align:center; margin-top:10px;">
      <span class="link" onclick="showLogin()">← Kembali ke Login</span>
    </div>
  </div>

  <!-- Halaman Reset Password (setelah lupa password) -->
  <div id="resetPage" class="container hidden">
    <h1>🛡️ Reset Password</h1>
    <div id="resetProfile" class="card profile-info"></div>
    <div id="resetError" class="error hidden"></div>
    <div id="resetSuccess" class="success hidden"></div>
    <input type="password" id="newPassword" placeholder="Password Baru">
    <input type="password" id="confirmNewPassword" placeholder="Konfirmasi Password Baru">
    <button onclick="resetPassword()">Simpan Password Baru</button>
    <div style="text-align:center; margin-top:10px;">
      <span class="link" onclick="showLogin()">← Kembali ke Login</span>
    </div>
  </div>

  <!-- Dashboard (setelah login) -->
  <div id="dashboard" class="dashboard hidden">
    <aside class="sidebar">
      <h2>🏪 TOKO ONLINE APP</h2>
      <nav>
        <a href="#" class="active" data-page="toko" onclick="navigateTo('toko')">📋 Manajemen Toko</a>
        <a href="#" data-page="profile" onclick="navigateTo('profile')">👤 Profile</a>
      </nav>
      <div style="margin-top:auto;">
        <button onclick="logout()" style="background:#dc2626; margin-top:20px;">🚪 Keluar</button>
      </div>
    </aside>

    <main class="content">
      <!-- Halaman Manajemen Toko -->
      <div id="tokoPage">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2>📋 Daftar Toko</h2>
          <button class="btn-sm btn-success" onclick="showBuatTokoForm()">+ Buat Toko Baru</button>
        </div>
        <div id="tokoList" class="grid-2"></div>
      </div>

      <!-- Form Buat Toko Baru (awalnya tersembunyi) -->
      <div id="buatTokoPage" class="hidden card" style="max-width:500px;">
        <h2>➕ Buat Toko Baru</h2>
        <input type="text" id="namaToko" placeholder="Nama Toko">
        <input type="text" id="pemilikToko" placeholder="Pemilik Toko">
        <textarea id="alamatToko" placeholder="Alamat Toko" rows="3"></textarea>
        <div style="display:flex; gap:10px;">
          <button onclick="simpanToko()" class="btn-sm btn-success">💾 Simpan</button>
          <button onclick="hideBuatTokoForm()" class="btn-sm" style="background:#6b7280;">Batal</button>
        </div>
      </div>

      <!-- Halaman Profile -->
      <div id="profilePage" class="hidden">
        <h2>👤 Profile</h2>
        <div id="profileInfo" class="card profile-info"></div>
        <div class="card" style="max-width:500px;">
          <h3>🔑 Ganti Password</h3>
          <div id="profileMsg" class="hidden"></div>
          <input type="password" id="profileNewPass" placeholder="Password Baru">
          <input type="password" id="profileConfirmPass" placeholder="Konfirmasi Password Baru">
          <button onclick="gantiPassword()">💾 Simpan Password Baru</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ====== DATA DEFAULT ======
    const DEFAULT_USER = {
      nama: "TOKO ONLINE APP",
      hp: "08123456789",
      email: "admin@tokoonline.com",
      username: "admin",
      password: "admin123"
    };

    // ====== FUNGSI STORAGE ======
    function getUser() {
      let user = localStorage.getItem('toko_app_user');
      if (!user) {
        localStorage.setItem('toko_app_user', JSON.stringify(DEFAULT_USER));
        return DEFAULT_USER;
      }
      return JSON.parse(user);
    }

    function saveUser(user) {
      localStorage.setItem('toko_app_user', JSON.stringify(user));
    }

    function getTokoList() {
      return JSON.parse(localStorage.getItem('toko_list') || '[]');
    }

    function saveTokoList(list) {
      localStorage.setItem('toko_list', JSON.stringify(list));
    }

    // ====== NAVIGASI & TAMPILAN ======
    let currentPage = 'toko'; // halaman aktif di dashboard

    function hideAll() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('forgotPage').classList.add('hidden');
      document.getElementById('resetPage').classList.add('hidden');
      document.getElementById('dashboard').classList.add('hidden');
    }

    function showLogin() {
      hideAll();
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginError').classList.add('hidden');
    }

    function showForgotPassword() {
      hideAll();
      document.getElementById('forgotPage').classList.remove('hidden');
      document.getElementById('forgotInput').value = '';
      document.getElementById('forgotError').classList.add('hidden');
    }

    function showResetPage(user) {
      hideAll();
      document.getElementById('resetPage').classList.remove('hidden');
      const profileDiv = document.getElementById('resetProfile');
      profileDiv.innerHTML = `
        <p><strong>Nama Aplikasi:</strong> ${user.nama}</p>
        <p><strong>Email:</strong> ${user.email}</p>
        <p><strong>Nomor HP:</strong> ${user.hp}</p>
      `;
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmNewPassword').value = '';
      document.getElementById('resetError').classList.add('hidden');
      document.getElementById('resetSuccess').classList.add('hidden');
    }

    function showDashboard() {
      hideAll();
      document.getElementById('dashboard').classList.remove('hidden');
      // Set halaman awal dashboard
      navigateTo('toko');
    }

    function navigateTo(page) {
      currentPage = page;
      // Update link active
      document.querySelectorAll('.sidebar nav a').forEach(a => {
        a.classList.toggle('active', a.dataset.page === page);
      });
      // Sembunyikan semua konten dashboard
      document.getElementById('tokoPage').classList.add('hidden');
      document.getElementById('buatTokoPage').classList.add('hidden');
      document.getElementById('profilePage').classList.add('hidden');
      
      if (page === 'toko') {
        document.getElementById('tokoPage').classList.remove('hidden');
        renderTokoList();
      } else if (page === 'profile') {
        document.getElementById('profilePage').classList.remove('hidden');
        renderProfile();
      }
    }

    // ====== LOGIN ======
    function login() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const user = getUser();
      if (username === user.username && password === user.password) {
        showDashboard();
      } else {
        const err = document.getElementById('loginError');
        err.textContent = 'Username atau password salah!';
        err.classList.remove('hidden');
      }
    }

    // ====== LUPA PASSWORD ======
    function verifyIdentity() {
      const input = document.getElementById('forgotInput').value.trim();
      const user = getUser();
      if (input === user.email || input === user.hp) {
        showResetPage(user);
      } else {
        const err = document.getElementById('forgotError');
        err.textContent = 'Email / Nomor HP tidak cocok dengan data terdaftar.';
        err.classList.remove('hidden');
      }
    }

    function resetPassword() {
      const newPass = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmNewPassword').value;
      const errDiv = document.getElementById('resetError');
      const succDiv = document.getElementById('resetSuccess');
      errDiv.classList.add('hidden');
      succDiv.classList.add('hidden');

      if (newPass.length < 4) {
        errDiv.textContent = 'Password minimal 4 karakter.';
        errDiv.classList.remove('hidden');
        return;
      }
      if (newPass !== confirmPass) {
        errDiv.textContent = 'Konfirmasi password tidak cocok.';
        errDiv.classList.remove('hidden');
        return;
      }
      // Update password
      const user = getUser();
      user.password = newPass;
      saveUser(user);
      succDiv.textContent = 'Password berhasil diubah! Silakan login ulang.';
      succDiv.classList.remove('hidden');
      // Redirect ke login setelah 2 detik
      setTimeout(() => {
        showLogin();
      }, 2000);
    }

    // ====== MANAJEMEN TOKO ======
    function renderTokoList() {
      const tokoList = getTokoList();
      const container = document.getElementById('tokoList');
      if (tokoList.length === 0) {
        container.innerHTML = '<p style="color:#6b7280;">Belum ada toko terdaftar.</p>';
        return;
      }
      container.innerHTML = tokoList.map(toko => `
        <div class="card">
          <h3 style="margin-bottom:8px;">${escapeHtml(toko.namaToko)}</h3>
          <p>👤 ${escapeHtml(toko.pemilik)}</p>
          <p>📍 ${escapeHtml(toko.alamat)}</p>
          <button class="btn-sm btn-danger" style="margin-top:10px;" onclick="hapusToko('${toko.id}')">🗑️ Hapus</button>
        </div>
      `).join('');
    }

    function showBuatTokoForm() {
      document.getElementById('buatTokoPage').classList.remove('hidden');
      document.getElementById('tokoPage').classList.add('hidden'); // opsional
    }

    function hideBuatTokoForm() {
      document.getElementById('buatTokoPage').classList.add('hidden');
      document.getElementById('tokoPage').classList.remove('hidden');
      document.getElementById('namaToko').value = '';
      document.getElementById('pemilikToko').value = '';
      document.getElementById('alamatToko').value = '';
    }

    function simpanToko() {
      const nama = document.getElementById('namaToko').value.trim();
      const pemilik = document.getElementById('pemilikToko').value.trim();
      const alamat = document.getElementById('alamatToko').value.trim();
      if (!nama || !pemilik || !alamat) {
        alert('Mohon lengkapi semua data toko.');
        return;
      }
      const tokoList = getTokoList();
      tokoList.push({
        id: Date.now().toString(),
        namaToko: nama,
        pemilik: pemilik,
        alamat: alamat
      });
      saveTokoList(tokoList);
      hideBuatTokoForm();
      renderTokoList();
    }

    function hapusToko(id) {
      if (!confirm('Yakin hapus toko ini?')) return;
      const tokoList = getTokoList().filter(t => t.id !== id);
      saveTokoList(tokoList);
      renderTokoList();
    }

    // ====== PROFILE ======
    function renderProfile() {
      const user = getUser();
      const infoDiv = document.getElementById('profileInfo');
      infoDiv.innerHTML = `
        <p><strong>Nama Aplikasi:</strong> ${user.nama}</p>
        <p><strong>HP:</strong> ${user.hp}</p>
        <p><strong>Email:</strong> ${user.email}</p>
        <p><strong>Username:</strong> ${user.username}</p>
      `;
      document.getElementById('profileNewPass').value = '';
      document.getElementById('profileConfirmPass').value = '';
      const msg = document.getElementById('profileMsg');
      msg.classList.add('hidden');
    }

    function gantiPassword() {
      const newPass = document.getElementById('profileNewPass').value;
      const confirmPass = document.getElementById('profileConfirmPass').value;
      const msgDiv = document.getElementById('profileMsg');
      msgDiv.classList.add('hidden');

      if (newPass.length < 4) {
        msgDiv.textContent = 'Password minimal 4 karakter.';
        msgDiv.className = 'error';
        msgDiv.classList.remove('hidden');
        return;
      }
      if (newPass !== confirmPass) {
        msgDiv.textContent = 'Konfirmasi password tidak cocok.';
        msgDiv.className = 'error';
        msgDiv.classList.remove('hidden');
        return;
      }
      const user = getUser();
      user.password = newPass;
      saveUser(user);
      msgDiv.textContent = 'Password berhasil diubah!';
      msgDiv.className = 'success';
      msgDiv.classList.remove('hidden');
      document.getElementById('profileNewPass').value = '';
      document.getElementById('profileConfirmPass').value = '';
    }

    // ====== LOGOUT ======
    function logout() {
      // Tidak hapus data user, tetap simpan user terakhir (jika diubah)
      showLogin();
    }

    // ====== HELPER ======
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ====== INISIALISASI ======
    // Pastikan user default ada
    if (!localStorage.getItem('toko_app_user')) {
      localStorage.setItem('toko_app_user', JSON.stringify(DEFAULT_USER));
    }
    // Tampilkan login saat pertama kali
    showLogin();
  </script>
</body>
</html>
