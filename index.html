<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin - Toko Online App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
    .container { max-width: 500px; margin: 80px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    h1, h2 { color: #1a56db; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
    input:focus, textarea:focus { outline: none; border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.2); }
    button { background: #1a56db; color: white; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
    button:hover { background: #1e40af; }
    .error { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
    .success { color: #059669; background: #d1fae5; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
    .link { color: #1a56db; text-decoration: none; font-size: 14px; cursor: pointer; }
    .link:hover { text-decoration: underline; }
    .hidden { display: none !important; }
    .dashboard { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: #fff; box-shadow: 2px 0 8px rgba(0,0,0,0.05); padding: 20px; display: flex; flex-direction: column; }
    .sidebar h2 { font-size: 20px; margin-bottom: 30px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; color: #374151; text-decoration: none; font-weight: 500; }
    .sidebar nav a.active, .sidebar nav a:hover { background: #eff6ff; color: #1a56db; }
    .content { flex: 1; padding: 40px; background: #f9fafb; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .btn-sm { padding: 6px 15px; font-size: 14px; width: auto; display: inline-flex; align-items: center; gap: 6px; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: #059669; }
    .btn-success:hover { background: #047857; }
    .profile-info p { margin: 8px 0; font-size: 15px; }
    .profile-info strong { display: inline-block; width: 120px; }
    @media (max-width: 768px) {
      .dashboard { flex-direction: column; }
      .sidebar { width: 100%; box-shadow: none; border-bottom: 1px solid #e5e7eb; }
      .content { padding: 20px; }
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginPage" class="container">
    <h1>🔐 Super Admin Login</h1>
    <div id="loginError" class="error hidden"></div>
    <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <div style="text-align:center; margin-top:10px;">
      <span class="link" onclick="showForgotPassword()">Lupa Password?</span>
    </div>
  </div>

  <!-- Lupa Password -->
  <div id="forgotPage" class="container hidden">
    <h1>🔑 Lupa Password</h1>
    <p>Masukkan email atau nomor HP yang terdaftar.</p>
    <div id="forgotError" class="error hidden"></div>
    <input type="text" id="forgotInput" placeholder="Email atau Nomor HP">
    <button onclick="verifyIdentity()">Lanjutkan</button>
    <div style="text-align:center; margin-top:10px;">
      <span class="link" onclick="showLogin()">← Kembali</span>
    </div>
  </div>

  <!-- Reset Password -->
  <div id="resetPage" class="container hidden">
    <h1>🛡️ Reset Password</h1>
    <div id="resetProfile" class="card profile-info"></div>
    <div id="resetError" class="error hidden"></div>
    <div id="resetSuccess" class="success hidden"></div>
    <input type="password" id="newPassword" placeholder="Password Baru">
    <input type="password" id="confirmNewPassword" placeholder="Konfirmasi Password Baru">
    <button onclick="resetPassword()">Simpan</button>
    <div style="text-align:center; margin-top:10px;">
      <span class="link" onclick="showLogin()">← Kembali ke Login</span>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard hidden">
    <aside class="sidebar">
      <h2>🏪 SUPER ADMIN</h2>
      <nav>
        <a href="#" class="active" data-page="toko" onclick="navigate('toko')">📋 Manajemen Toko</a>
        <a href="#" data-page="profile" onclick="navigate('profile')">👤 Profile</a>
      </nav>
      <div style="margin-top:auto;">
        <button onclick="logout()" style="background:#dc2626;">🚪 Keluar</button>
      </div>
    </aside>
    <main class="content">
      <div id="tokoPage">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2>📋 Daftar Toko</h2>
          <button class="btn-sm btn-success" onclick="showBuatToko()">+ Buat Toko Baru</button>
        </div>
        <div id="tokoList" class="grid-2"></div>
      </div>
      <div id="buatTokoPage" class="hidden card" style="max-width:500px;">
        <h2>➕ Buat Toko Baru</h2>
        <input type="text" id="namaToko" placeholder="Nama Toko">
        <input type="text" id="pemilikToko" placeholder="Pemilik Toko">
        <textarea id="alamatToko" placeholder="Alamat Toko" rows="2"></textarea>
        <input type="text" id="usernameToko" placeholder="Username Login Toko">
        <input type="password" id="passwordToko" placeholder="Password Login Toko">
        <div style="display:flex; gap:10px;">
          <button onclick="simpanToko()" class="btn-sm btn-success">💾 Simpan</button>
          <button onclick="hideBuatToko()" class="btn-sm" style="background:#6b7280;">Batal</button>
        </div>
      </div>
      <div id="profilePage" class="hidden">
        <h2>👤 Profile Super Admin</h2>
        <div id="profileInfo" class="card profile-info"></div>
        <div class="card" style="max-width:500px;">
          <h3>🔑 Ganti Password</h3>
          <div id="profileMsg" class="hidden"></div>
          <input type="password" id="profileNewPass" placeholder="Password Baru">
          <input type="password" id="profileConfirmPass" placeholder="Konfirmasi Password Baru">
          <button onclick="gantiPassword()">💾 Simpan</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const SUPER_ADMIN = {
      nama: "TOKO ONLINE APP",
      hp: "081220285226",
      email: "dedesugiono.ai@gmail.com",
      username: "superadmin",
      password: "tokoonlineapp"
    };

    function getSA() {
      let sa = localStorage.getItem('super_admin');
      if (!sa) {
        localStorage.setItem('super_admin', JSON.stringify(SUPER_ADMIN));
        return SUPER_ADMIN;
      }
      return JSON.parse(sa);
    }

    function saveSA(user) {
      localStorage.setItem('super_admin', JSON.stringify(user));
    }

    function getTokoList() {
      return JSON.parse(localStorage.getItem('toko_list') || '[]');
    }

    function saveTokoList(list) {
      localStorage.setItem('toko_list', JSON.stringify(list));
    }

    let currentPage = 'toko';

    function hideAll() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('forgotPage').classList.add('hidden');
      document.getElementById('resetPage').classList.add('hidden');
      document.getElementById('dashboard').classList.add('hidden');
    }

    function showLogin() {
      hideAll();
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginError').classList.add('hidden');
    }

    function showForgotPassword() {
      hideAll();
      document.getElementById('forgotPage').classList.remove('hidden');
      document.getElementById('forgotInput').value = '';
      document.getElementById('forgotError').classList.add('hidden');
    }

    function showResetPage(user) {
      hideAll();
      document.getElementById('resetPage').classList.remove('hidden');
      document.getElementById('resetProfile').innerHTML = `
        <p><strong>Nama Aplikasi:</strong> ${user.nama}</p>
        <p><strong>Email:</strong> ${user.email}</p>
        <p><strong>Nomor HP:</strong> ${user.hp}</p>
      `;
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmNewPassword').value = '';
      document.getElementById('resetError').classList.add('hidden');
      document.getElementById('resetSuccess').classList.add('hidden');
    }

    function showDashboard() {
      hideAll();
      document.getElementById('dashboard').classList.remove('hidden');
      navigate('toko');
    }

    function navigate(page) {
      currentPage = page;
      document.querySelectorAll('.sidebar nav a').forEach(a => {
        a.classList.toggle('active', a.dataset.page === page);
      });
      document.getElementById('tokoPage').classList.add('hidden');
      document.getElementById('buatTokoPage').classList.add('hidden');
      document.getElementById('profilePage').classList.add('hidden');

      if (page === 'toko') {
        document.getElementById('tokoPage').classList.remove('hidden');
        renderTokoList();
      } else if (page === 'profile') {
        document.getElementById('profilePage').classList.remove('hidden');
        renderProfile();
      }
    }

    function login() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const sa = getSA();
      if (username === sa.username && password === sa.password) {
        sessionStorage.setItem('sa_session', '1');
        showDashboard();
      } else {
        document.getElementById('loginError').textContent = 'Username atau password salah!';
        document.getElementById('loginError').classList.remove('hidden');
      }
    }

    function verifyIdentity() {
      const input = document.getElementById('forgotInput').value.trim();
      const sa = getSA();
      if (input === sa.email || input === sa.hp) {
        showResetPage(sa);
      } else {
        document.getElementById('forgotError').textContent = 'Email / Nomor HP tidak cocok.';
        document.getElementById('forgotError').classList.remove('hidden');
      }
    }

    function resetPassword() {
      const newP = document.getElementById('newPassword').value.trim();
      const confirmP = document.getElementById('confirmNewPassword').value.trim();
      const err = document.getElementById('resetError');
      const succ = document.getElementById('resetSuccess');
      err.classList.add('hidden');
      succ.classList.add('hidden');
      if (newP.length < 4) {
        err.textContent = 'Password minimal 4 karakter.';
        err.classList.remove('hidden');
        return;
      }
      if (newP !== confirmP) {
        err.textContent = 'Konfirmasi password tidak cocok.';
        err.classList.remove('hidden');
        return;
      }
      const sa = getSA();
      sa.password = newP;
      saveSA(sa);
      succ.textContent = 'Password berhasil diubah! Silakan login ulang.';
      succ.classList.remove('hidden');
      setTimeout(showLogin, 2000);
    }

    function renderTokoList() {
      const list = getTokoList();
      const container = document.getElementById('tokoList');
      if (list.length === 0) {
        container.innerHTML = '<p style="color:#6b7280;">Belum ada toko terdaftar.</p>';
        return;
      }
      container.innerHTML = list.map(t => `
        <div class="card">
          <h3>${escapeHtml(t.namaToko)}</h3>
          <p>👤 ${escapeHtml(t.pemilik)}</p>
          <p>📍 ${escapeHtml(t.alamat)}</p>
          <p>🔑 Login: ${escapeHtml(t.username)}</p>
          <button class="btn-sm btn-danger" style="margin-top:10px;" onclick="hapusToko('${t.id}')">🗑️ Hapus</button>
        </div>
      `).join('');
    }

    function showBuatToko() {
      document.getElementById('buatTokoPage').classList.remove('hidden');
      document.getElementById('tokoPage').classList.add('hidden');
      ['namaToko','pemilikToko','alamatToko','usernameToko','passwordToko'].forEach(id => {
        document.getElementById(id).value = '';
      });
    }

    function hideBuatToko() {
      document.getElementById('buatTokoPage').classList.add('hidden');
      document.getElementById('tokoPage').classList.remove('hidden');
    }

    function simpanToko() {
      const nama = document.getElementById('namaToko').value.trim();
      const pemilik = document.getElementById('pemilikToko').value.trim();
      const alamat = document.getElementById('alamatToko').value.trim();
      const username = document.getElementById('usernameToko').value.trim();
      const password = document.getElementById('passwordToko').value.trim();
      if (!nama || !pemilik || !alamat || !username || !password) {
        alert('Lengkapi semua data.');
        return;
      }
      const list = getTokoList();
      list.push({
        id: Date.now().toString(),
        namaToko: nama,
        pemilik: pemilik,
        alamat: alamat,
        username: username,
        password: password
      });
      saveTokoList(list);
      hideBuatToko();
      renderTokoList();
    }

    function hapusToko(id) {
      if (!confirm('Hapus toko ini? Semua data produk & pesanan akan hilang.')) return;
      const list = getTokoList().filter(t => t.id !== id);
      saveTokoList(list);
      localStorage.removeItem('produk_' + id);
      localStorage.removeItem('pesanan_' + id);
      renderTokoList();
    }

    function renderProfile() {
      const sa = getSA();
      document.getElementById('profileInfo').innerHTML = `
        <p><strong>Nama Aplikasi:</strong> ${sa.nama}</p>
        <p><strong>HP:</strong> ${sa.hp}</p>
        <p><strong>Email:</strong> ${sa.email}</p>
        <p><strong>Username:</strong> ${sa.username}</p>
      `;
      document.getElementById('profileNewPass').value = '';
      document.getElementById('profileConfirmPass').value = '';
      document.getElementById('profileMsg').classList.add('hidden');
    }

    function gantiPassword() {
      const newP = document.getElementById('profileNewPass').value.trim();
      const confirmP = document.getElementById('profileConfirmPass').value.trim();
      const msg = document.getElementById('profileMsg');
      msg.classList.add('hidden');
      if (newP.length < 4) {
        msg.textContent = 'Password minimal 4 karakter.';
        msg.className = 'error';
        msg.classList.remove('hidden');
        return;
      }
      if (newP !== confirmP) {
        msg.textContent = 'Konfirmasi password tidak cocok.';
        msg.className = 'error';
        msg.classList.remove('hidden');
        return;
      }
      const sa = getSA();
      sa.password = newP;
      saveSA(sa);
      msg.textContent = 'Password berhasil diubah!';
      msg.className = 'success';
      msg.classList.remove('hidden');
    }

    function logout() {
      sessionStorage.removeItem('sa_session');
      showLogin();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Init
    if (!localStorage.getItem('super_admin')) {
      localStorage.setItem('super_admin', JSON.stringify(SUPER_ADMIN));
    }
    if (sessionStorage.getItem('sa_session')) {
      showDashboard();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
